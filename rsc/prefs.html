<nav class="navbar navbar-default" role="navigation">
  <div class="container-fluid">
    <div class="navbar-header">
      <a class="navbar-brand" href="#">Duschfee</a>
    </div>
  </div>
</nav>
<div class="col-md-9">
  <form role="form" ng-repeat="t in prefs.timers">
    <div class="form-group">
      <textarea class="form-control" rows="3" ng-model="t.desc"></textarea>
    </div>
    <div class="form-group">
      <select ng-model="t.dur" class="form-control">
        <option value="1">1 min</option>
        <option value="2">2 min</option>
        <option value="3">3 min</option>
        <option value="4">4 min</option>
        <option value="5">5 min</option>
      </select>
    </div>
    <div class="form-group pull-right">
      <button type="button" class="btn btn-default btn-sm" ng-me-touch ng-click="rmvTimer($index)"><span class="glyphicon glyphicon-trash"></span> Löschen</button>
    </div>
    <div class="clearfix"></div>
  </form>

  <form role="form">
    <div class="form-group">
      <button class="btn btn-default" ng-me-touch ng-click="addTimer()">Hinzuf&uuml;gen</button>
    </div>
  </form>
  <hr>
  <form role="form">
    <div class="checkbox">
      <label>
        <input type="checkbox" ng-model="prefs.startOnLaunch"> Timer mit App starten
      </label>
    </div>
    <hr>
    <button class="center-block btn btn-default" ng-me-touch ng-click="resetPrefs()">Zur&uuml;cksetzen</button>
    <br><br>
  </form>
</div>
